  <!-- HERO -->
  <section class="hero topo-bg">
    <div class="container">
      <img src="assets/images/chalkmap_logo.png" alt="ChalkMap" class="hero-logo">
      <h1>ChalkMap<span class="dot">.</span></h1>
      <p class="tagline" data-en="The hub for outdoor bouldering" data-ja="外岩ボルダリングの情報を、ひとつの場所に。"></p>
      <p class="subtitle" data-en="Every crag, every problem, every bit of local knowledge — in one place, kept current by the community." data-ja="エリアも、課題も、登り方も。クライマーの手で集めて、いつも最新に。"></p>
      <p class="description" data-en="Outdoor bouldering info is scattered across guidebooks, posts, videos, and people's memories — so it's needlessly hard to find boulders, know which line is right, or judge the risk before you pull on. ChalkMap brings it together: discover crags on a map, see community-consensus grades and beta with the original send videos, and log your own climbs — while establishers keep full control of what's public and what stays private." data-ja="外岩の情報は、トポやSNS、動画、人づての話に散らばっていて、行きたい課題を探すのも、どのラインが正解なのか確かめるのも、取り付く前に危険かどうか判断するのも、意外と大変です。ChalkMapは、その情報をひとつの場所にまとめるアプリ。地図でエリアを探し、みんなの体感グレードや登り方、完登動画をまとめて確認できて、自分の完登も記録できます。どの情報を公開し、どれを非公開のままにするかは、開拓者がすべて自分で決められます。"></p>
      <div class="hero-buttons">
        <a href="#" class="btn btn-primary" onclick="return false;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>

        </a>

  <!-- WHY -->
  <section class="overview" id="why">
    <div class="container">
      <div class="section-title">
        <span class="kicker" data-en="Why ChalkMap" data-ja="WHY CHALKMAP"></span>
        <h2 data-en="The home that beta never had" data-ja="ChalkMapができた理由"></h2>
      </div>
      <div class="overview-content">
        <p data-en="If you've climbed outside, you know the feeling: you find a boulder you want to try, and the beta is spread across a guidebook, a few Instagram posts, a YouTube clip, and someone's memory — and half the time you still aren't sure you're on the right line." data-ja="外岩を登る人なら、きっと覚えがあるはずです。登りたい課題を見つけても、その情報はトポやSNS、動画、誰かの記憶の中にバラバラ。しかも、自分が本当に正しいラインを登れているのか、いまひとつ確信が持てない。"></p>
        <br>
        <p data-en="ChalkMap is the home that information never had. One map. One living record per problem, kept honest and current by the people who actually climb it — the kind of thing that makes you wonder why it didn't exist already." data-ja="ChalkMapは、そんな散らばった情報を「ひとつの場所」にまとめるアプリです。ひとつの地図に、課題ごとのひとつの記録。実際にそこを登る人たちの手で、正確に、最新に保たれていく。「こういうの、なんで今までなかったんだろう」——そう思ってもらえるアプリを目指しています。"></p>
      </div>
    </div>
  </section>

  <!-- FOR ESTABLISHERS / PRIVACY PROMISE -->
  <section class="establisher topo-bg" id="for-establishers">
    <div class="container">
      <div class="section-title">
        <span class="kicker" data-en="For Establishers" data-ja="FOR ESTABLISHERS"></span>
        <h2 data-en="Your crag, your call" data-ja="あなたのエリアは、あなたの判断で"></h2>
      </div>
      <p class="establisher-intro" data-en="ChalkMap exists because of establishers — the people who find, clean, and open the crags the rest of us get to climb. We built it to take the load of documenting and sharing off your shoulders, never to take control away from you." data-ja="ChalkMapは、開拓者がいてこそ成り立つアプリです。エリアを見つけ、掃除し、登れる状態にして、みんなに共有してくれる——その記録と共有の手間を、少しでも軽くしたい。そう思ってつくりました。"></p>
      <div class="promise-grid">
        <div class="promise-card">
          <h3 data-en="Private is a promise" data-ja="非公開は、約束です"></h3>
          <p data-en="A crag you keep private stays completely private. Only the people you invite can see it — full stop." data-ja="非公開にしたエリアは、ずっと非公開のまま。あなたが招いた人だけが見られます。"></p>
        </div>
        <div class="promise-card">
          <h3 data-en="Open it when you're ready" data-ja="公開のタイミングは、自分で"></h3>
          <p data-en="Make a crag public when the time is right. Invite trusted climbers as co-establishers, and see real access data — who's visiting and how often — so you can decide based on what's actually happening on the ground." data-ja="準備ができたら公開すればいい。信頼できる人を共同開拓者として招いたり、実際のアクセス状況（どれくらいの人が訪れているか）を見たりしながら、現場の様子を見て決められます。"></p>
        </div>
        <div class="promise-card">
          <h3 data-en="Change your mind, safely" data-ja="非公開に戻したいときも、安心して"></h3>
          <p data-en="Need to take a public crag back to private — say an access issue comes up? You can. To protect everyone, un-publishing a public crag goes through a quick review by our team rather than flipping instantly." data-ja="アクセスの問題が起きたなど、公開したエリアを非公開に戻したいとき。それもできます。ただ、公開済みのエリアを非公開に戻すときは、すぐに切り替わるのではなく、運営の確認をはさんでから反映されます。"></p>
        </div>
        <div class="promise-card">
          <h3 data-en="Not a topo — a tool for topos" data-ja="トポの代わりではなく、トポを支える道具に"></h3>
          <p data-en="ChalkMap isn't a guidebook and won't replace yours. It's an information-sharing platform — and the felt-grade and access data it gathers can make keeping your own material current easier." data-ja="ChalkMapはガイドブックでも、トポの代わりでもありません。あくまで情報を共有する場所です。集まった体感グレードやアクセスの情報は、あなた自身のトポを最新に保つのにも役立ちます。"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- COMMUNITY GUIDELINES -->

    <div class="container">
      <div class="section-title">
        <span class="kicker" data-en="Community" data-ja="COMMUNITY"></span>
        <h2 data-en="Climb with respect" data-ja="リスペクトを持って登る"></h2>
        <p data-en="Outdoor climbing only stays open if we look after it. ChalkMap is built to grow the community without overrunning the crags that make it possible." data-ja="外岩は、みんなで大切にしてはじめて、登り続けられる場所です。ChalkMapは、岩場に負担をかけずにクライマーの輪を広げることを大事にしています。"></p>
      </div>
      <div class="guidelines-content">
        <p data-en="We ask everyone to:" data-ja="みんなにお願いしたいこと："></p>
        <ul class="guidelines-list">
          <li>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span data-en="Respect local access rules and landowners" data-ja="エリアごとのアクセスルールと土地の所有者を尊重する"></span>
          </li>
          <li>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span data-en="Care for the rock and the natural environment" data-ja="岩や自然を傷つけない"></span>
          </li>
          <li>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span data-en="Share accurate, responsible information" data-ja="正確で、責任のある情報を共有する"></span>
          </li>
          <li>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span data-en="Honor each establisher's wishes for their crags" data-ja="それぞれのエリアについての開拓者の意向を尊重する"></span>
          </li>
        </ul>
        <p class="guidelines-note" data-en="Reporting tools let the community flag issues so they can be reviewed." data-ja="問題のある投稿は報告でき、確認のうえ対応されます。"></p>
      </div>
    </div>
  </section>

  <!-- FAQ -->
  <section class="faq" id="faq">
    <div class="container">
      <div class="section-title">
        <span class="kicker" data-en="FAQ" data-ja="FAQ"></span>
        <h2 data-en="Questions, answered" data-ja="よくある質問"></h2>
      </div>
      <div class="faq-list">

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="What is ChalkMap, and how do I get started?" data-ja="ChalkMapとは？どう始めればいいですか？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="ChalkMap is a community-built information platform for outdoor bouldering. Every crag, boulder, and problem on the map is contributed and kept current by the climbers who actually climb there — grades, photos, line drawings, danger notes, and local access info in one place. To get started, download the app, create a free account, and open the map to explore crags near you. You can browse and log climbs right away; adding content is available once you're signed in." data-ja="ChalkMapは、外岩ボルダリングのためのコミュニティ型情報プラットフォームです。地図上のエリア・ボルダー・課題はすべて、実際にそこで登るクライマーが投稿し、最新に保っています——グレード、写真、ライン、危険度、アクセス情報をひとつに。まずはアプリをダウンロードして無料アカウントを作成し、地図を開いて近くのエリアを探してみてください。閲覧と完登の記録はすぐに使えます。コンテンツの追加はサインイン後に可能です。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="How do I add content — crags, boulders, problems, and photos?" data-ja="エリアやボルダー、課題、写真はどうやって追加しますか？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="Tap the + button on the map or crag detail screen to add a new crag, boulder, problem, or parking spot. All new content starts private — only you can see it until you choose to make it public. When you're ready to share, tap Make public and the app runs a quick content check; if it passes, the item goes live on the public map. Photos can be added to any boulder or crag from the detail screen." data-ja="地図またはエリア詳細画面の「＋」ボタンから、新しいエリア・ボルダー・課題・駐車場を追加できます。新しく追加した情報はすべて非公開から始まり、公開するまで自分にしか見えません。共有する準備ができたら「公開する」をタップ——簡単な内容チェックを通過すると、公開マップに表示されます。写真はボルダーやエリアの詳細画面からいつでも追加できます。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="What is crag establishment? Establisher, co-establishers, and guests" data-ja="エリアの開拓者・共同開拓者・ゲストの違いは？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="Every crag has one establisher — the person who created it and holds full control. The establisher can invite other climbers as co-establishers (who can add boulders and content) or as guests (who can view the crag and log climbs, but cannot add content). On a public crag, any signed-in climber can add content. On a private crag, only the establisher and co-establishers can add; guests get read-only access." data-ja="どのエリアにも、作成者である開拓者が一人います。開拓者はそのエリアの全権を持ち、他のクライマーを共同開拓者（ボルダーや課題を追加できる）またはゲスト（閲覧と完登の記録はできるが、追加はできない）として招待できます。公開エリアでは、サインインしているクライマーなら誰でも情報を追加できます。非公開エリアで追加できるのは開拓者と共同開拓者のみで、ゲストは閲覧のみです。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="How do I invite people to a private crag?" data-ja="非公開エリアに人を招待するには？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="From the crag's Manage Access screen, tap Invite climbers. You can search by username, invite followers, or generate a single-use invite code (valid 7 days) to share however you like. Invited climbers join as guests by default; you can promote anyone to co-establisher from Manage Access at any time — and change it back later." data-ja="エリアの「アクセス管理」画面から「クライマーを招待」をタップします。ユーザー名で検索する、フォロワーから選ぶ、または7日間有効の使い切り招待コードを発行して好きな方法で共有する——のいずれでも招待できます。招待されたクライマーは最初はゲストとして参加します。アクセス管理からいつでも共同開拓者に昇格でき、後から戻すことも可能です。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="Who can see my content? Public vs. private" data-ja="自分の投稿は誰に見えますか？（公開と非公開）"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="When a crag is private, it is invisible to everyone except the establisher, co-establishers, and invited guests — full stop. When a crag is public (after passing review), it appears on the map and in search for everyone. Boulders and problems inherit the visibility of their parent crag.&#10;&#10;If you need to take a public crag back to private — say an access issue arises — you can request that. To protect the community, un-publishing goes through a quick review by our team rather than flipping instantly." data-ja="非公開のエリアは、開拓者・共同開拓者・招待されたゲスト以外には一切見えません。公開エリアは（確認を通過した後）すべてのユーザーの地図と検索に表示されます。ボルダーや課題の公開範囲は、属するエリアに従います。&#10;&#10;アクセス上の問題などで公開エリアを非公開に戻したい場合も、申請できます。コミュニティを守るため、非公開化はすぐには反映されず、運営による確認を経て行われます。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="How do I report a problem or flag unsafe content?" data-ja="問題のある投稿や危険な情報を報告するには？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="Tap Report on any crag, boulder, problem, parking spot, send, comment, user, or photo, then choose a type: a safety / access concern (closures, dangerous landings, access issues — visible to the community on that content's page), inappropriate content (spam, false info, harassment — goes to the ChalkMap team only), or a removal request. You can attach a photo to safety reports. Once submitted, you'll see a confirmation." data-ja="エリア・ボルダー・課題・駐車場・完登・コメント・ユーザー・写真のどれでも、「報告」から知らせることができます。種類は3つ：安全・アクセスに関する報告（閉鎖、危険な着地、アクセス問題など——その情報のページでコミュニティにも表示されます）、不適切なコンテンツ（スパム、虚偽情報、嫌がらせなど——運営のみに届きます）、削除のリクエスト。安全に関する報告には写真も添付できます。送信後、確認メッセージが表示されます。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="How do I delete my account?" data-ja="アカウントを削除するには？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="Go to Profile → Edit → Account → Delete account. The app asks you to re-enter your password, then schedules the deletion with a 30-day grace period — you can sign back in any time within those 30 days to restore your account. After that, your account and personal data are permanently removed." data-ja="プロフィール → 編集 → アカウント → アカウントを削除、の順に進みます。セキュリティのためパスワードを再入力すると、削除が予約されます。30日間の猶予期間中はいつでもサインインし直してアカウントを復元できます。期間を過ぎると、アカウントと個人データは完全に削除されます。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="Is ChalkMap free? What does Premium unlock?" data-ja="ChalkMapは無料ですか？Premiumでは何ができますか？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="The core app is free: browsing the map, logging climbs, adding content, following climbers, and all community features. ChalkMap Premium unlocks deeper data and tools — offline crag downloads (map tiles and content for full offline use), Climber Data (your personal analytics — grade distribution, highest-grade progression, total sends over time, by-area breakdowns, and more), establisher access data on the lines and crags you've established, per-crag climbing stats, and advanced insights. You can subscribe any time from the Premium screen in your profile." data-ja="基本機能はすべて無料です：地図の閲覧、完登の記録、コンテンツの追加、クライマーのフォロー、コミュニティ機能。ChalkMap Premiumでは、さらに踏み込んだデータとツールが使えます——エリアの一括ダウンロード（地図タイルごとオフラインで利用可能）、クライマーデータ（自分の記録を分析——グレード分布、最高グレードの推移、期間ごとの完登数、エリア別データなど）、開拓したエリアと課題のアクセスデータ、エリアごとの登攀データ、高度な分析。プロフィールのPremium画面から、いつでも登録できます。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="How do grades work?" data-ja="グレードはどのように表示されますか？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="Every problem can show three grade scales side by side — V-scale, Japanese 段/級, and Font — so climbers from any tradition can read it at a glance. Set your preferred scale in your settings and it becomes your primary display. Alongside the original grade you'll see the community felt grade — the consensus of climbers who've actually done the problem — so you know whether it's soft, at grade, or sandbagged." data-ja="課題のグレードは、Vグレード・段/級・フレンチ（Font）の3つのスケールを並べて表示できます。普段使っているスケールを設定すれば、それがメイン表示になります。初登時のグレードと並んで、実際にその課題を登ったクライマーたちの体感グレードも表示されるので、「辛め」か「甘め」か、登る前に感覚がつかめます。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="Does ChalkMap work offline?" data-ja="オフラインでも使えますか？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="Yes — the app is built offline-first. Content you've already loaded stays available without signal: crags, boulders, line photos, and logging sends all work offline, and anything you add syncs automatically when you reconnect. Downloading a crag for full offline use — including map tiles — is a Premium feature: tap Download on any crag." data-ja="はい——ChalkMapはオフラインファーストで設計されています。一度読み込んだエリアやボルダー、ラインの写真は電波のない岩場でもそのまま見られ、完登の記録もオフラインで可能です。オフライン中に追加した内容は、再接続時に自動で同期されます。地図タイルまで含めたエリアの一括ダウンロードはPremium機能です——エリア詳細の「ダウンロード」からどうぞ。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="How does content review and management work?" data-ja="コンテンツの確認・管理はどう行われますか？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="New public content goes through an automated check when you tap Make public — if it passes, it goes live immediately; if something needs fixing, you'll get a note explaining what, and you can edit and resubmit. Community reports are reviewed by the ChalkMap team and resolved based on severity. Safety and access reports stay visible to the community on the relevant page." data-ja="「公開する」をタップすると、新しい公開コンテンツには自動チェックが入ります。通過すればすぐに公開され、修正が必要な場合は理由が表示されるので、編集して再申請できます。コミュニティからの報告は運営が確認し、内容に応じて対応します。安全・アクセスに関する報告は、該当ページでコミュニティにも表示され続けます。"></div></div>
        </div>

        <div class="faq-item">
          <button class="faq-question" aria-expanded="false">
            <span data-en="Is the information on ChalkMap safe to rely on?" data-ja="ChalkMapの情報は信頼して大丈夫ですか？"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer"><div class="faq-answer-inner" data-en="ChalkMap is a community-sourced information platform — not a professional topo, and not a substitute for your own judgment. Grades, access status, danger flags, and condition notes are contributed by climbers and aren't professionally verified. Conditions change, holds break, landings deteriorate — always verify current conditions yourself before climbing.&#10;&#10;Climb at your own risk. Always climb within your ability, use appropriate protection, and follow local access rules and landowner wishes." data-ja="ChalkMapはコミュニティ発の情報プラットフォームであり、専門家が監修したトポではありません。あなた自身の判断に代わるものでもありません。グレード、アクセス状況、危険度、コンディションの情報はクライマーの投稿によるもので、専門的な検証はされていません。岩は変化します——ホールドは欠け、着地は荒れ、アクセスルールも変わります。登る前に、必ず現地の最新状況をご自身で確認してください。&#10;&#10;クライミングは自己責任です。自分の力量の範囲で、適切な安全対策をとり、各エリアのルールと土地所有者の意向を守って登ってください。"></div></div>
        </div>

      </div>
    </div>
  </section>

  <script>
    var TITLES = { en: "ChalkMap — The hub for outdoor bouldering", ja: "ChalkMap — 外岩ボルダリングのハブ" };

    function setLang(lang) {
      document.documentElement.lang = lang;
      document.body.setAttribute('data-lang', lang);
      document.querySelectorAll('[data-en]').forEach(function (el) {
        var t = el.getAttribute('data-' + lang);
        if (t !== null) el.textContent = t;
      });
      document.getElementById('langLabel').textContent = (lang === 'en') ? '日本語' : 'EN';
      document.title = TITLES[lang];
      try { localStorage.setItem('cmLang', lang); } catch (e) {}
    }

    document.getElementById('langToggle').addEventListener('click', function () {
      var current = document.body.getAttribute('data-lang');
      setLang(current === 'en' ? 'ja' : 'en');
    });

    // Mobile hamburger
    var navToggle = document.getElementById('navToggle');
    var navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', function () {
      var open = navLinks.classList.toggle('active');
      navToggle.classList.toggle('active', open);
      navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    // Close the menu after tapping a link (mobile)
    navLinks.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', function () {
        navLinks.classList.remove('active');
        navToggle.classList.remove('active');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });

    // FAQ accordion (one open at a time)
    document.querySelectorAll('.faq-question').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var item = this.parentElement;
        var isActive = item.classList.contains('active');
        document.querySelectorAll('.faq-item').forEach(function (el) {
          el.classList.remove('active');
          el.querySelector('.faq-question').setAttribute('aria-expanded', 'false');
        });
        if (!isActive) {
          item.classList.add('active');
          this.setAttribute('aria-expanded', 'true');
        }
      });
    });

    // init — honor ?lang= param, then saved preference, default EN
    var params = new URLSearchParams(location.search);
    var saved = null;
    try { saved = localStorage.getItem('cmLang'); } catch (e) {}
    var initLang = params.get('lang') === 'ja' ? 'ja' : params.get('lang') === 'en' ? 'en' : (saved === 'ja' ? 'ja' : 'en');
    setLang(initLang);
  </script>
